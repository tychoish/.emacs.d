name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "30.2"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Cask
        uses: cask/setup-cask@master

      - name: Install dependencies
        run: cask install

      - name: Remove stale byte-compiled files
        run: find elpa -name "*.elc" -delete

      - name: Run tests
        run: cask exec ert-runner test/test-*.el

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - "30.2"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install system dependencies
        run: sudo apt-get install -y aspell aspell-en

      - name: Link repo as ~/.emacs.d
        run: ln -sf "$GITHUB_WORKSPACE" ~/.emacs.d

      - name: Remove stale byte-compiled files
        run: find ~/.emacs.d/elpa -name "*.elc" -delete

      - name: Run integration tests
        run: emacs --fg-daemon --eval '(bootstrap-run-ci-tests)'
