name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - "29.4"
          - "30.1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Cask
        uses: cask/setup-cask@master

      - name: Install dependencies
        run: cask install

      - name: Run tests
        run: |
          cask exec ert-runner \
            test/test-xlib.el \
            test/test-builder.el \
            test/test-project-projectile-integration.el \
            test/test-annotated-completing-read.el \
            test/test-magit-gh-extras.el

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - "29.4"
          - "30.1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Link repo as ~/.emacs.d
        run: ln -sf "$GITHUB_WORKSPACE" ~/.emacs.d

      - name: Remove stale byte-compiled files
        run: find ~/.emacs.d/elpa -name "*.elc" -delete

      - name: Run integration tests
        run: emacs --fg-daemon --eval '(tychoish/run-ci-tests)'
