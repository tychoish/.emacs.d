name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - "29.4"
          - "30.1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emacs (bootstrap)
        uses: purcell/setup-emacs@master
        with:
          version: "30.1"

      - name: Set up Emacs and Cask
        uses: cask/setup-cask@master
        with:
          emacs-version: ${{ matrix.emacs_version }}

      - name: Install dependencies
        run: cask install

      - name: Run tests
        run: |
          cask exec ert-runner --timeout 60 \
            test/test-xlib.el \
            test/test-builder.el \
            test/test-project-projectile-integration.el \
            test/test-annotated-completing-read.el \
            test/test-magit-gh-extras.el

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - "29.4"
          - "30.1"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Emacs (bootstrap)
        uses: purcell/setup-emacs@master
        with:
          version: "30.1"

      - name: Set up Emacs and Cask
        uses: cask/setup-cask@master
        with:
          emacs-version: ${{ matrix.emacs_version }}

      - name: Run integration tests
        run: |
          EMACSLOADPATH=$(find elpa -maxdepth 1 -mindepth 1 -type d | tr '\n' ':') \
          HOME=$(dirname "$GITHUB_WORKSPACE") \
          emacs --fg-daemon \
            --eval '(tychoish/run-ci-tests)'
